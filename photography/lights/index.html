<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shifting Dialogues — Lilli Brenner</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <style>
    /* ---- Shifting Dialogues Project Page ---- */

    .sd-intro {
      display: flex;
      gap: 30px;
      padding: 36px 36px 0;
      align-items: flex-start;
    }

    .sd-intro__image {
      flex: 0 0 clamp(180px, 35vw, 529px);
      height: clamp(250px, 45.3vw, 685px);
      overflow: hidden;
    }

    .sd-intro__image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sd-intro__text {
      flex: 1;
      padding-top: 4px;
    }

    .sd-page-title {
      font-family: 'Corporate A Pro', serif;
      font-style: italic;
      font-size: clamp(2rem, 4vw, 60px);
      font-weight: 400;
      line-height: 1.2;
      color: #000;
      margin-bottom: 24px;
    }

    .sd-text-block {
      font-family: 'Helvetica', sans-serif;
      font-size: clamp(14px, 1.6vw, 24px);
      font-weight: 400;
      line-height: 1.2;
      color: #000;
      max-width: 60vw;
    }

    .sd-text-block strong {
      font-weight: 700;
    }

    .sd-text-block p + p {
      margin-top: 16px;
    }

    /* Full-width images */
    .sd-full {
      margin-top: 0;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      font-size: 0;
    }

    .sd-full img {
      width: 100%;
      height: auto;
      display: block;
    }

    .sd-full--first {
      margin-top: 36px;
    }

    /* Two-column rows */
    .sd-pair {
      display: grid;
      width: 100%;
      line-height: 0;
      font-size: 0;
    }

    .sd-pair__left,
    .sd-pair__right {
      overflow: hidden;
      line-height: 0;
      font-size: 0;
    }

    .sd-pair__left img,
    .sd-pair__right img {
      width: 100%;
      height: auto;
      display: block;
      vertical-align: bottom;
    }

    /* Bottom navigation */
    .sd-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 48px 96px 60px;
      background: #fff;
    }

    .sd-nav a {
      display: block;
      transition: opacity 0.2s;
    }

    .sd-nav a:hover {
      opacity: 0.45;
    }

    .sd-nav img {
      height: 60px;
      width: auto;
      display: block;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar__logo">
      <a href="../../index.html" style="font-family: Helvetica;">Lilli Brenner</a>
    </div>
    <ul class="navbar__links">
      <li><a href="../index.html" class="active">Design</a></li>
      <li><a href="../../photography/index.html">Photography</a></li>
    </ul>
  </nav>

  <!-- Intro: flyer poster left + title & text right -->
  <section style="margin: 200px 36px 0 36px; display: flex; flex-direction: column; gap: 250px">
  <!-- Full-width: A4 flyer mockup -->
  <div style="display: flex; justify-content: space-between;">
    <img style="margin-top: 20vh; width: 40vw;"
      src="assets/1.png"
      alt="lights poster"
    />
    <img style="margin-bottom: 20vh; width: 45vw;"
      src="assets/2.png"
      alt="lights poster"
    />
  </div>
  <div style="display: flex; justify-content: space-between;">
    <img style="min-width: 40vw; padding-top: 5vh;"
      src="assets/3.png"
      alt="lights poster"
    />
    <div style="display: flex; width: 100%; justify-content: center;">
      <div></div>
      <img style="width: 35vw;"
        src="assets/4.png"
        alt="lights poster"
      />
      <div></div>
    </div>
  </div>
    <div style="display: flex; justify-content: space-between;">
    <img style="min-width: 45vw;"
      src="assets/5.png"
      alt="lights poster"
    />
      <img style="width: 40vw; padding-bottom: 15vh;"
        src="assets/6.png"
        alt="lights poster"
      />
  </div>
  <!-- Bottom navigation arrows -->
</section>
<nav class="sd-nav" aria-label="Project navigation">
  <a href="../mountains/index.html" aria-label="Previous project">
    <img src="../../design/arrow.png" alt="←" />
  </a>
  <a href="../boat/index.html" aria-label="Next project">
    <img style="transform: rotate(180deg);" src="../../design/arrow.png" alt="→" />
  </a>
</nav>

  <script src="../../js/main.js"></script>
</body>
</html>
