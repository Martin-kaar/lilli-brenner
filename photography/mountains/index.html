<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountains — Lilli Brenner</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <style>
    /* ---- Mountains (Kanada) Photography Page ---- */

    .photo-grid {
      padding: 36px 36px 0;
      display: flex;
      flex-direction: column;
      gap: 200px;
    }

    /* Row: single full-width image */
    .photo-row--full img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* Flex rows */
    .photo-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    /* Bottom navigation */
    .photo-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 48px 96px 60px;
      background: #fff;
    }

    .photo-nav a {
      display: block;
      transition: opacity 0.2s;
    }

    .photo-nav a:hover { opacity: 0.45; }

    .photo-nav img {
      height: 60px;
      width: auto;
      display: block;
    }
        /* Bottom navigation */
    .sd-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 48px 96px 60px;
      background: #fff;
    }

    .sd-nav a {
      display: block;
      transition: opacity 0.2s;
    }

    .sd-nav a:hover {
      opacity: 0.45;
    }

    .sd-nav img {
      height: 60px;
      width: auto;
      display: block;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar__logo">
      <a href="../../index.html" style="font-family: Helvetica;">Lilli Brenner</a>
    </div>
    <ul class="navbar__links">
      <li><a href="../../design/index.html">Design</a></li>
      <li><a href="../index.html" class="active" style="color: #0015FF;">Photography</a></li>
    </ul>
  </nav>

  <div class="photo-grid">

    <!-- Row 1: Full-width hero -->
    <div class="photo-row--full">
      <img
        src="assets/1.png"
        alt="Mountain landscape at dusk"
      />
    </div>

    <!-- Row 2: wide left + portrait right -->
    <div style="display: flex; justify-content: space-between;">
        <img style="max-width: 55vw; min-height: 600px" src="assets/2.png" alt="Mountain and trees" />
        <img style="max-width: 30vw; min-height: 600px" src="assets/3.png" alt="Horse in field" />
    </div>

    <!-- Row 3: three equal columns -->
    <div class="photo-row photo-row--r3" style="gap: 0">
      <img src="assets/4-5-6.png" alt="portrait">
    </div>

    <!-- Row 4: spacer + wide image (offset right) -->
    <div class="photo-row photo-row--r4" style="justify-content: flex-end;">
      <div class="col-a">
        <img src="assets/7.png" alt="People in mountain landscape" />
      </div>
    </div>

    <!-- Row 5: wide left + narrow right portrait -->
    <div class="photo-row photo-row--r5" style="justify-content: space-between;">
      <div class="col-a">
        <img style="min-width: 60vw" src="assets/8.png" alt="Car in parking lot forest" />
      </div>
      <div class="col-b">
        <img style="min-width: 20vw" src="assets/9.png" alt="Waterfall rocks" />
      </div>
    </div>

    <!-- Row 6: narrow left + medium right -->
    <div class="photo-row photo-row--r6" style="gap: 15vw">
      <div class="col-a">
        <img src="assets/10.png" alt="Autumn trees" />
      </div>
      <div class="col-b">
        <img src="assets/11.png" alt="Mountain lake" />
      </div>
      <div class="col-spacer"></div>
    </div>

    <!-- Row 7: two tall images, centred -->
    <div style="display: flex; gap: 150px; justify-content: flex-end;">
      <div class="col-a">
        <img src="assets/12.png" alt="City buildings" />
      </div>
      <div class="col-b">
        <img src="assets/13.png" alt="City buildings" />
      </div>
    </div>

  </div>

 <nav class="sd-nav" aria-label="Project navigation">
    <a href="../emulation/index.html" aria-label="Previous project">
      <img src="../../design/arrow.png" alt="←" />
    </a>
    <a href="../lights/index.html" aria-label="Next project">
      <img style="transform: rotate(180deg);" src="../../design/arrow.png" alt="→" />
    </a>
  </nav>

  <script src="../../js/main.js"></script>
</body>
</html>
