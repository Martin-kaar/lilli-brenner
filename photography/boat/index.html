<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountains — Lilli Brenner</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <style>
    /* ---- Mountains (Kanada) Photography Page ---- */

    .photo-grid {
      padding: 36px 36px 0;
      display: flex;
      flex-direction: column;
      gap: 200px;
    }

    /* Row: single full-width image */
    .photo-row--full img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* Flex rows */
    .photo-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    /* Bottom navigation */
    .photo-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 48px 96px 60px;
      background: #fff;
    }

    .photo-nav a {
      display: block;
      transition: opacity 0.2s;
    }

    .photo-nav a:hover { opacity: 0.45; }

    .photo-nav img {
      height: 60px;
      width: auto;
      display: block;
    }
        /* Bottom navigation */
    .sd-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 48px 96px 60px;
      background: #fff;
    }

    .sd-nav a {
      display: block;
      transition: opacity 0.2s;
    }

    .sd-nav a:hover {
      opacity: 0.45;
    }

    .sd-nav img {
      height: 60px;
      width: auto;
      display: block;
    }
  </style>
</head>
<body style="margin: 36px">

  <nav class="navbar">
